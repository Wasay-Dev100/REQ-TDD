<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit' if mode == 'edit' else 'New' }} Menu Item</title>
</head>
<body>
    <h1>{{ 'Edit' if mode == 'edit' else 'New' }} Menu Item</h1>

    {% if mode == 'new' %}
        <form action="{{ url_for('add_edit_delete_menu_items.create_menu_item') }}" method="post">
    {% else %}
        <form action="{{ url_for('add_edit_delete_menu_items.update_menu_item', menu_item_id=menu_item.id) }}" method="post">
    {% endif %}
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ menu_item.name if menu_item else '' }}" required>
        <br>

        <label for="description">Description:</label>
        <textarea id="description" name="description">{{ menu_item.description if menu_item else '' }}</textarea>
        <br>

        <label for="price">Price:</label>
        <input type="number" step="0.01" id="price" name="price" value="{{ menu_item.price if menu_item else '' }}" required>
        <br>

        <label for="is_available">Available:</label>
        <input type="checkbox" id="is_available" name="is_available" {% if menu_item and menu_item.is_available %}checked{% endif %}>
        <br>

        <label for="image_url">Image URL:</label>
        <input type="url" id="image_url" name="image_url" value="{{ menu_item.image_url if menu_item else '' }}">
        <br>

        <button type="submit">{{ 'Update' if mode == 'edit' else 'Create' }}</button>
    </form>

    {% if errors %}
        <ul>
            {% for key, error in errors.items() %}
                <li>{{ key }}: {{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
