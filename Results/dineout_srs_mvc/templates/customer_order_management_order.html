<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order</title>
</head>
<body>
  <h1>Order</h1>

  {% if order %}
    <div>Order #{{ order.id }} - status={{ order.status }}</div>
  {% endif %}

  <h2>Items</h2>
  <ul>
    {% for i in order_items %}
      <li>product_id={{ i.product_id }} qty={{ i.quantity }} total={{ i.line_total_cents }}</li>
    {% endfor %}
  </ul>

  <h2>Timer</h2>
  <pre>{{ timer }}</pre>
</body>
</html>
