<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit' if mode == 'edit' else 'Create' }} Staff Member</title>
</head>
<body>
    <h1>{{ 'Edit' if mode == 'edit' else 'Create' }} Staff Member</h1>
    <form method="post">
        <label for="full_name">Full Name:</label>
        <input type="text" id="full_name" name="full_name" value="{{ staff_member.full_name if staff_member else '' }}">
        <span>{{ errors.get('full_name') }}</span><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ staff_member.email if staff_member else '' }}">
        <span>{{ errors.get('email') }}</span><br>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" value="{{ staff_member.phone if staff_member else '' }}"><br>

        <label for="position">Position:</label>
        <input type="text" id="position" name="position" value="{{ staff_member.position if staff_member else '' }}">
        <span>{{ errors.get('position') }}</span><br>

        <label for="hourly_rate">Hourly Rate:</label>
        <input type="text" id="hourly_rate" name="hourly_rate" value="{{ staff_member.hourly_rate if staff_member else '' }}">
        <span>{{ errors.get('hourly_rate') }}</span><br>

        <button type="submit">{{ 'Update' if mode == 'edit' else 'Create' }}</button>
    </form>
</body>
</html>
