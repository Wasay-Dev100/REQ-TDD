<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
</head>
<body>
    <h1>Email Verification</h1>
    {% if status == "success" %}
        <p>Your email has been successfully verified. You can now <a href="{{ url_for('login') }}">login</a>.</p>
    {% else %}
        <p>Verification failed. Please try again or contact support.</p>
    {% endif %}
</body>
</html>
