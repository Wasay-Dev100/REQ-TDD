<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Event</title>
</head>
<body>
    <h1>Edit Event for {{ club.name }}</h1>
    <form action="/clubs/{{ club.slug }}/events/{{ event.id }}" method="post">
        <input type="hidden" name="_method" value="PUT">
        
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ event.title }}" required><br>
        
        <label for="description">Description:</label>
        <textarea id="description" name="description">{{ event.description }}</textarea><br>
        
        <label for="location">Location:</label>
        <input type="text" id="location" name="location" value="{{ event.location }}"><br>
        
        <label for="start_at">Start Time:</label>
        <input type="datetime-local" id="start_at" name="start_at" value="{{ event.start_at }}" required><br>
        
        <label for="end_at">End Time:</label>
        <input type="datetime-local" id="end_at" name="end_at" value="{{ event.end_at }}" required><br>
        
        <button type="submit">Update</button>
    </form>
</body>
</html>
