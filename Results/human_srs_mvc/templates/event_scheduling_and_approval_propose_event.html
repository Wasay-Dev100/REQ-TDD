<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Propose Event</title>
</head>
<body>
    <h1>Propose Event for Club</h1>
    <p>Club: {{ club.name }}</p>
    <form method="post" action="/clubs/{{ club_id }}/events/propose">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br>
        <label for="description">Description:</label>
        <textarea id="description" name="description"></textarea><br>
        <label for="location">Location:</label>
        <input type="text" id="location" name="location"><br>
        <label for="start_at">Start Time:</label>
        <input type="datetime-local" id="start_at" name="start_at" required><br>
        <label for="end_at">End Time:</label>
        <input type="datetime-local" id="end_at" name="end_at" required><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
