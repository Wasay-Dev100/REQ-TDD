<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Landing Page</title>
</head>
<body>
    {% if is_authenticated %}
        <h1>Welcome, {{ user.name }}!</h1>
        <form action="/logout" method="post">
            <button type="submit">Logout</button>
        </form>
    {% else %}
        <h1>Welcome to the Platform</h1>
        <a href="/auth/google/login">Login with Google</a>
    {% endif %}
</body>
</html>
