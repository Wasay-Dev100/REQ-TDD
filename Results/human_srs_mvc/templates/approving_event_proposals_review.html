<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Event Proposal</title>
</head>
<body>
    <h1>Review Proposal: {{ proposal.title }}</h1>
    <p>{{ proposal.description }}</p>
    <form action="{{ url_for('approving_event_proposals.approve_event_request', proposal_id=proposal.id) }}" method="post">
        <textarea name="comment" placeholder="Comment"></textarea>
        <button type="submit">Approve</button>
    </form>
    <form action="{{ url_for('approving_event_proposals.reject_event_request', proposal_id=proposal.id) }}" method="post">
        <textarea name="comment" placeholder="Comment"></textarea>
        <button type="submit">Reject</button>
    </form>
    {% if error %}
    <p>{{ error }}</p>
    {% endif %}
    <a href="{{ url_for('approving_event_proposals.list_pending_event_requests') }}">Back to Pending List</a>
</body>
</html>
